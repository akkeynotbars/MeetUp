<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - MeetUp</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --surface: #111318;
  --surface2: #1a1d26;
  --orange: #f7944d;
  --orange-light: #ffb574;
  --orange-glow: rgba(247,148,77,0.25);
  --text: #e8e4dc;
  --muted: #7a7670;
  --accent: #4a9fd4;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  display: flex; flex-direction: column;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  overflow-x: hidden;
}

/* Ambient glows */
body::before, body::after {
  content: ""; position: fixed; border-radius: 50%;
  filter: blur(100px); pointer-events: none; z-index: 0;
}
body::before {
  width: 400px; height: 400px; top: -150px; right: -100px;
  background: rgba(74,159,212,0.06);
  animation: drift 8s ease-in-out infinite alternate;
}
body::after {
  width: 350px; height: 350px; bottom: -100px; left: -80px;
  background: rgba(247,148,77,0.08);
  animation: drift 8s 2s ease-in-out infinite alternate;
}
@keyframes drift {
  from { transform: translate(0,0); }
  to { transform: translate(30px, 20px); }
}

/* Nav */
nav {
  position: relative; z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.2rem 5vw;
  background: linear-gradient(to bottom, rgba(10,12,16,0.95), transparent);
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem; font-weight: 900;
  color: var(--orange-light); text-decoration: none;
  letter-spacing: -0.5px;
}
.logo i { margin-right: 0.3rem; font-size: 1.1rem; }
.logo span { color: var(--text); }
.nav-links { display: flex; align-items: center; gap: 1.5rem; }
.nav-links a {
  color: var(--muted); text-decoration: none;
  font-size: 0.9rem; font-weight: 500; transition: color 0.3s;
}
.nav-links a:hover { color: var(--orange-light); }
.nav-cta {
  background: var(--orange); color: #0a0c10;
  padding: 0.5rem 1.3rem; border-radius: 50px;
  font-weight: 600; font-size: 0.85rem;
  text-decoration: none; transition: all 0.3s;
}
.nav-cta:hover { background: var(--orange-light); transform: translateY(-1px); }

/* Main */
.main {
  flex: 1; display: flex; justify-content: center; align-items: center;
  padding: 2rem; position: relative; z-index: 1;
}

/* Card */
.card {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  padding: 2.5rem 3rem;
  width: 460px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: fadeUp 0.6s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

.card-header { text-align: center; margin-bottom: 1.8rem; }
.card-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem; font-weight: 900;
  margin-bottom: 0.4rem;
}
.card-header p { color: var(--muted); font-size: 0.9rem; }

/* Role selector */
.role-selector {
  display: flex; gap: 0.8rem; margin-bottom: 1.3rem;
}
.role-option {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 0.4rem;
  padding: 1rem 0.8rem;
  background: var(--surface2);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 14px; cursor: pointer;
  transition: all 0.3s; text-align: center;
}
.role-option:hover { border-color: rgba(247,148,77,0.3); }
.role-option.selected {
  border-color: var(--orange);
  background: rgba(247,148,77,0.08);
  box-shadow: 0 0 20px rgba(247,148,77,0.1);
}
.role-option .role-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
}
.role-option.selected .role-icon { color: var(--orange-light); }
.role-option .role-name {
  font-size: 0.82rem; font-weight: 600;
  color: var(--muted); transition: 0.3s;
}
.role-option.selected .role-name { color: var(--orange-light); }

/* Inputs */
.input-group { margin-bottom: 1rem; }
.input-group label {
  display: block; font-size: 0.82rem; font-weight: 500;
  color: var(--muted); margin-bottom: 0.35rem;
  letter-spacing: 0.3px;
}
.input-group input, .input-group select {
  width: 100%; padding: 0.75rem 1rem;
  background: var(--surface2);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 12px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  outline: none; transition: 0.3s;
  -webkit-appearance: none;
}
.input-group input::placeholder { color: #4a4640; }
.input-group input:focus, .input-group select:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px rgba(247,148,77,0.1);
}
.input-group select { cursor: pointer; }
.input-group select option { background: var(--surface2); color: var(--text); }

/* Company fields */
#companyFields {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.4s ease, opacity 0.3s ease;
  opacity: 0;
}
#companyFields.visible {
  max-height: 200px;
  opacity: 1;
}

/* CAPTCHA */
.captcha-box {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.7rem 1rem; margin-bottom: 1.2rem;
  background: var(--surface2);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 12px;
}
.captcha-label {
  display: flex; align-items: center; gap: 0.6rem;
  font-size: 0.85rem; color: var(--muted); cursor: pointer;
}
.captcha-label input[type="checkbox"] {
  width: 18px; height: 18px; accent-color: var(--orange);
}
.captcha-badge { font-size: 0.68rem; color: #4a4640; font-style: italic; }

/* Button */
.signup-btn {
  width: 100%; padding: 0.85rem;
  background: linear-gradient(135deg, var(--orange), #d4752f);
  color: #0a0c10; border: none; border-radius: 50px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem; font-weight: 700;
  cursor: pointer; transition: all 0.3s;
  box-shadow: 0 4px 20px var(--orange-glow);
}
.signup-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(247,148,77,0.4);
}

/* Footer */
.card-footer {
  text-align: center; margin-top: 1.2rem;
  font-size: 0.85rem; color: var(--muted);
}
.card-footer a {
  color: var(--orange-light); text-decoration: none;
  font-weight: 500; transition: 0.2s;
}
.card-footer a:hover { color: var(--orange); text-decoration: underline; }

/* Particles */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.particle {
  position: absolute; width: 2px; height: 2px;
  background: var(--orange); border-radius: 50%;
  animation: floatUp linear infinite; opacity: 0;
}
@keyframes floatUp {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  20% { opacity: 0.4; }
  80% { opacity: 0.15; }
  100% { transform: translateY(-200px) translateX(15px); opacity: 0; }
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<nav>
  <a href="index.html" class="logo"><i class="fas fa-people-arrows"></i> Meet<span>Up</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="login.html" class="nav-cta">Log In</a>
  </div>
</nav>

<div class="main">
  <div class="card">
    <div class="card-header">
      <h2>Create Account</h2>
      <p>Join MeetUp and start your career journey</p>
    </div>

    <form onsubmit="handleSignup(event)">
      <div class="role-selector">
        <div class="role-option selected" onclick="selectRole(this, 'user')">
          <div class="role-icon"><i class="fas fa-user"></i></div>
          <span class="role-name">Job Seeker</span>
        </div>
        <div class="role-option" onclick="selectRole(this, 'company')">
          <div class="role-icon"><i class="fas fa-building"></i></div>
          <span class="role-name">Company</span>
        </div>
      </div>

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Enter your full name" required>
      </div>

      <div id="companyFields">
        <div class="input-group">
          <label>Company Name</label>
          <input type="text" id="companyName" placeholder="Enter company name">
        </div>
        <div class="input-group">
          <label>Industry</label>
          <select id="industry">
            <option value="">Select industry</option>
            <option>Technology</option>
            <option>Finance</option>
            <option>Healthcare</option>
            <option>E-commerce</option>
            <option>Education</option>
            <option>Manufacturing</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@email.com" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create a strong password" required>
      </div>

      <div class="captcha-box">
        <label class="captcha-label">
          <input type="checkbox" id="captchaCheck" required>
          <span>I'm not a robot</span>
        </label>
        <span class="captcha-badge">reCAPTCHA</span>
      </div>

      <button class="signup-btn" id="signupBtn">Create Account</button>
    </form>

    <div class="card-footer">
      Already have an account? <a href="login.html">Log In</a>
    </div>
  </div>
</div>

<script>
// Particles
const pc = document.getElementById('particles');
for (let i = 0; i < 12; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = (Math.random() * 100) + '%';
  p.style.top = (60 + Math.random() * 40) + '%';
  p.style.animationDuration = (5 + Math.random() * 7) + 's';
  p.style.animationDelay = (Math.random() * 5) + 's';
  pc.appendChild(p);
}

let selectedRole = 'user';

function selectRole(el, role) {
  selectedRole = role;
  document.querySelectorAll('.role-option').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
  const cf = document.getElementById('companyFields');
  if (role === 'company') { cf.classList.add('visible'); }
  else { cf.classList.remove('visible'); }
}

function handleSignup(e) {
  e.preventDefault();
  const btn = document.getElementById('signupBtn');
  btn.innerText = 'Creating account...';
  btn.style.opacity = '0.7';
  setTimeout(() => {
    btn.innerText = 'Verification email sent!';
    btn.style.background = '#27c93f';
    if (selectedRole === 'company') {
      alert('Company account created with "Pending Verification" status. Please check your email.');
    } else {
      alert('Account created! A verification email has been sent. Please verify to continue.');
    }
    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
  }, 1500);
}
</script>
</body>
</html>
