<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — MeetUp</title>

  <!-- Shared auth styles -->
  <link rel="stylesheet" href="../shared/auth.css">

  <!-- External -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Page-specific styles (signup only) -->
  <style>
    /* Ambient glow positions for the signup page (mirrored from login) */
    body::before {
      width: 400px; height: 400px; top: -150px; right: -100px;
      background: rgba(74, 159, 212, 0.06);
      animation: drift 8s ease-in-out infinite alternate;
    }
    body::after {
      width: 350px; height: 350px; bottom: -100px; left: -80px;
      background: rgba(247, 148, 77, 0.08);
      animation: drift 8s 2s ease-in-out infinite alternate;
    }

    /* Signup card (a touch wider than login) */
    .card {
      width: 460px;
      padding: 2.5rem 3rem;
    }
    .card-header { margin-bottom: 1.8rem; }
    .input-group { margin-bottom: 1rem; }

    /* Role selector (vertical card style — different from login's segmented tabs) */
    .role-selector {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.3rem;
    }
    .role-option {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 1rem 0.8rem;
      background: var(--surface2);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }
    .role-option:hover { border-color: rgba(247, 148, 77, 0.3); }
    .role-option.selected {
      border-color: var(--orange);
      background: rgba(247, 148, 77, 0.08);
      box-shadow: 0 0 20px rgba(247, 148, 77, 0.1);
    }
    .role-option .role-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
    .role-option.selected .role-icon { color: var(--orange-light); }
    .role-option .role-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      transition: 0.3s;
    }
    .role-option.selected .role-name { color: var(--orange-light); }

    /* Company-only fields slide open/closed */
    #companyFields {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.4s ease, opacity 0.3s ease;
    }
    #companyFields.visible {
      max-height: 200px;
      opacity: 1;
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<nav>
  <a href="index.html" class="logo"><i class="fas fa-people-arrows"></i> Meet<span>Up</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="login.html" class="nav-cta">Log In</a>
  </div>
</nav>

<div class="main">
  <div class="card">
    <div class="card-header">
      <h2>Create Account</h2>
      <p>Join MeetUp and start your career journey</p>
    </div>

    <form onsubmit="handleSignup(event)">
      <div class="role-selector">
        <div class="role-option selected" onclick="selectRole(this, 'user')">
          <div class="role-icon"><i class="fas fa-user"></i></div>
          <span class="role-name">Job Seeker</span>
        </div>
        <div class="role-option" onclick="selectRole(this, 'company')">
          <div class="role-icon"><i class="fas fa-building"></i></div>
          <span class="role-name">Company</span>
        </div>
      </div>

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Enter your full name" required>
      </div>

      <div id="companyFields">
        <div class="input-group">
          <label>Company Name</label>
          <input type="text" id="companyName" placeholder="Enter company name">
        </div>
        <div class="input-group">
          <label>Industry</label>
          <select id="industry">
            <option value="">Select industry</option>
            <option>Technology</option>
            <option>Finance</option>
            <option>Healthcare</option>
            <option>E-commerce</option>
            <option>Education</option>
            <option>Manufacturing</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@email.com" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create a strong password" required>
      </div>

      <div class="captcha-box">
        <label class="captcha-label">
          <input type="checkbox" id="captchaCheck" required>
          <span>I'm not a robot</span>
        </label>
        <span class="captcha-badge">reCAPTCHA</span>
      </div>

      <button class="auth-btn" id="signupBtn">Create Account</button>
    </form>

    <div class="card-footer">
      Already have an account? <a href="login.html">Log In</a>
    </div>
  </div>
</div>

<!-- Shared helpers (particles) -->
<script src="../shared/auth.js"></script>

<script>
  // Spawn floating particles
  spawnParticles('particles', 12);

  let selectedRole = 'user';

  function selectRole(el, role) {
    selectedRole = role;
    document.querySelectorAll('.role-option').forEach(function (r) { r.classList.remove('selected'); });
    el.classList.add('selected');
    const cf = document.getElementById('companyFields');
    if (role === 'company') { cf.classList.add('visible'); }
    else { cf.classList.remove('visible'); }
  }

  // Signup (placeholder — hooked up to backend in Week 2)
  function handleSignup(e) {
    e.preventDefault();
    const btn = document.getElementById('signupBtn');
    btn.innerText = 'Creating account...';
    btn.style.opacity = '0.7';
    setTimeout(function () {
      btn.innerText = 'Verification email sent!';
      btn.style.background = '#27c93f';
      if (selectedRole === 'company') {
        alert('Company account created with "Pending Verification" status. Please check your email.');
      } else {
        alert('Account created! A verification email has been sent. Please verify to continue.');
      }
      setTimeout(function () { window.location.href = 'login.html'; }, 1500);
    }, 1500);
  }
</script>
</body>
</html>
