<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MeetUp</title>

  <!-- Shared auth styles -->
  <link rel="stylesheet" href="../shared/auth.css">

  <!-- External -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Page-specific styles (login only) -->
  <style>
    /* Ambient glow positions for the login page */
    body::before {
      width: 400px; height: 400px; top: -150px; left: -100px;
      background: rgba(247, 148, 77, 0.08);
      animation: drift 8s ease-in-out infinite alternate;
    }
    body::after {
      width: 350px; height: 350px; bottom: -100px; right: -80px;
      background: rgba(74, 159, 212, 0.06);
      animation: drift 8s 2s ease-in-out infinite alternate;
    }

    /* Login card */
    .card { width: 420px; }

    /* Role selector (segmented tabs) */
    .role-selector {
      display: flex;
      margin-bottom: 1.2rem;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      overflow: hidden;
    }
    .role-tab {
      flex: 1;
      text-align: center;
      padding: 0.7rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      background: var(--surface2);
      transition: 0.3s;
    }
    .role-tab:first-child { border-right: 1px solid rgba(255, 255, 255, 0.06); }
    .role-tab.active {
      background: linear-gradient(135deg, var(--orange), #d4752f);
      color: #0a0c10;
      font-weight: 600;
    }
    .role-tab:hover:not(.active) {
      background: rgba(247, 148, 77, 0.06);
      color: var(--text);
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<nav>
  <a href="index.html" class="logo"><i class="fas fa-people-arrows"></i> Meet<span>Up</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="signup.html" class="nav-cta">Sign Up</a>
  </div>
</nav>

<div class="main">
  <div class="card">
    <div class="card-header">
      <h2>Welcome Back</h2>
      <p>Sign in to continue your journey</p>
    </div>

    <form id="loginForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="you@email.com" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="pass-wrapper">
          <input type="password" id="password" placeholder="Enter your password" required>
          <span class="show-pass" id="showPassBtn">Show</span>
        </div>
      </div>

      <div class="role-selector">
        <div class="role-tab active" data-role="user"><i class="fas fa-user"></i>&nbsp; Job Seeker</div>
        <div class="role-tab" data-role="company"><i class="fas fa-building"></i>&nbsp; Company</div>
      </div>

      <div class="captcha-box">
        <label class="captcha-label">
          <input type="checkbox" id="captchaCheck" required>
          <span>I'm not a robot</span>
        </label>
        <span class="captcha-badge">reCAPTCHA</span>
      </div>

      <button class="auth-btn" id="loginBtn">Login</button>
    </form>

    <div class="card-footer">
      <a href="#" id="forgotLink">Forgot Password?</a>
    </div>
    <div class="card-footer" style="margin-top:0.6rem;">
      Don't have an account? <a href="signup.html">Sign Up</a>
    </div>
  </div>
</div>

<!-- Shared helpers (particles + password toggle) -->
<script src="../shared/auth.js"></script>

<script>
  // Spawn floating particles
  spawnParticles('particles', 12);

  let loginRole = 'user';

  // Show/hide password
  document.getElementById('showPassBtn').addEventListener('click', function () {
    togglePasswordVisibility(this, 'password');
  });

  // Role selector
  document.querySelectorAll('.role-tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      loginRole = this.dataset.role;
      document.querySelectorAll('.role-tab').forEach(function (t) { t.classList.remove('active'); });
      this.classList.add('active');
    });
  });

  // Forgot password (placeholder — real flow in Week 2)
  document.getElementById('forgotLink').addEventListener('click', function (e) {
    e.preventDefault();
    alert('Password reset link sent to your email!');
  });

  // Login (placeholder — hooked up to backend in Week 2)
  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.innerText = 'Logging in...';
    btn.style.opacity = '0.7';
    setTimeout(function () {
      btn.innerText = 'Success!';
      btn.style.background = '#27c93f';
      setTimeout(function () {
        if (loginRole === 'company') {
          window.location.href = '../CompanyDashboard/dashboard.html';
        } else {
          window.location.href = '../UserDashboard/dashboard.html';
        }
      }, 800);
    }, 1200);
  });
</script>
</body>
</html>
